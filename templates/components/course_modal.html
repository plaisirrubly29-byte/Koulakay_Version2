{% load i18n %}
<!-- ══════════════════════════════════════════════
     Modal d'inscription à un cours
     Utilisé par: home.html, courses.html
     ══════════════════════════════════════════════ -->

<!-- Overlay -->
<div id="courseModal"
     class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden"
     style="background:rgba(20,6,0,0.65);backdrop-filter:blur(4px);"
     onclick="if(event.target===this) closeCourseModal()">

    <!-- Boîte de dialogue -->
    <div id="courseModalBox"
         class="relative w-full max-w-lg bg-white rounded-3xl overflow-hidden shadow-2xl
                transform scale-95 opacity-0 transition-all duration-300"
         style="max-height:90vh;">

        <!-- Image du cours -->
        <div class="relative h-48 w-full" style="background:linear-gradient(135deg,#C4853A,#7C3D0E);">
            <img id="modalImg" src="" alt="" class="w-full h-full object-cover hidden">
            <!-- Bouton fermer -->
            <button onclick="closeCourseModal()"
                    class="absolute top-3 right-3 w-9 h-9 flex items-center justify-center rounded-full bg-black/40 text-white hover:bg-black/60 transition z-10">
                <span class="material-symbols-outlined text-xl">close</span>
            </button>
            <!-- Badge prix -->
            <div class="absolute bottom-3 left-4">
                <span id="modalPriceBadge"
                      class="px-3 py-1 text-sm font-bold text-white rounded-full shadow"
                      style="background:rgba(20,6,0,0.7);backdrop-filter:blur(4px);"></span>
            </div>
        </div>

        <!-- Corps -->
        <div class="p-6 overflow-y-auto" style="max-height:calc(90vh - 12rem);">

            <!-- Titre -->
            <h2 id="modalTitle" class="text-xl font-bold text-brand-900 mb-3 leading-snug"></h2>

            <!-- Description -->
            <p id="modalDesc" class="text-sm text-brand-500 leading-relaxed mb-6"></p>

            <!-- Résumé rapide -->
            <div class="flex gap-3 mb-6">
                <div id="modalAccessBadge" class="flex-1 rounded-xl p-3 text-center border">
                    <span id="modalAccessIcon" class="material-symbols-outlined text-xl block mb-1"></span>
                    <p id="modalAccessLabel" class="text-xs font-bold leading-tight"></p>
                    <p id="modalAccessSub" class="text-xs font-medium mt-0.5 opacity-70"></p>
                </div>
                <div class="flex-1 bg-brand-50 rounded-xl p-3 text-center border border-brand-100">
                    <span class="material-symbols-outlined text-brand-500 text-xl block mb-1">workspace_premium</span>
                    <p class="text-xs text-brand-500 font-medium">{% trans "Certifié" %}</p>
                </div>
                <div class="flex-1 bg-brand-50 rounded-xl p-3 text-center border border-brand-100">
                    <span class="material-symbols-outlined text-brand-500 text-xl block mb-1">support_agent</span>
                    <p class="text-xs text-brand-500 font-medium">{% trans "Support" %}</p>
                </div>
            </div>

            <!-- Prix affiché -->
            <div class="flex items-center justify-between mb-6 pb-5 border-b border-brand-100">
                <div>
                    <p class="text-xs text-brand-400 uppercase tracking-wider font-medium mb-1">{% trans "Prix" %}</p>
                    <p id="modalPrice" class="text-2xl font-black text-brand-800"></p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-brand-400 uppercase tracking-wider font-medium mb-1">{% trans "Paiement" %}</p>
                    <p class="text-xs text-brand-600 font-semibold">MonCash · NatCash · Carte</p>
                </div>
            </div>

            <!-- Boutons -->
            <div class="flex flex-col gap-3">
                <!-- Procéder au paiement -->
                <form id="modalEnrollForm" method="POST" action="">
                    {% csrf_token %}
                    <button type="submit" class="w-full kl-btn-cta py-3 font-bold rounded-xl text-base">
                        <span class="material-symbols-outlined align-middle mr-1 text-lg" style="vertical-align:-3px;">payment</span>
                        {% trans "Procéder au paiement" %}
                    </button>
                </form>

                <!-- Plus de détails -->
                <a id="modalDetailsLink" href="#"
                   class="w-full text-center py-3 border-2 border-brand-300 text-brand-700 font-semibold rounded-xl hover:bg-brand-50 transition text-base">
                    <span class="material-symbols-outlined align-middle mr-1 text-lg" style="vertical-align:-3px;">info</span>
                    {% trans "Plus de détails" %}
                </a>
            </div>

        </div>
    </div>
</div>

<style>
@keyframes kl-pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(196,133,58,0.0); }
  50%       { box-shadow: 0 0 0 6px rgba(196,133,58,0.18); }
}
.kl-access-limited { animation: kl-pulse-glow 2.4s ease-in-out infinite; }
</style>

<script>
// Ouvrir le modal — les URLs sont passées directement depuis les data-attrs du bouton
function openCourseModal(enrollUrl, detailsUrl, name, desc, price, imgUrl, accessDuration) {
    // Textes
    document.getElementById('modalTitle').textContent = name;
    document.getElementById('modalDesc').textContent = desc || '{% trans "Découvrez ce cours exceptionnel conçu par des experts." %}';

    // Prix — devise configurée dans l'admin
    var siteCurrency = '{{ site_currency|default:"USD" }}';
    var priceNum = parseFloat(price);
    var priceFormatted = (priceNum % 1 === 0) ? priceNum.toFixed(0) : priceNum.toFixed(2);
    var priceText = (priceNum === 0 || isNaN(priceNum))
        ? '{% trans "Gratuit" %}'
        : priceFormatted + ' ' + siteCurrency;
    document.getElementById('modalPrice').textContent = priceText;
    document.getElementById('modalPriceBadge').textContent = priceText;

    // Badge accès
    var badge  = document.getElementById('modalAccessBadge');
    var icon   = document.getElementById('modalAccessIcon');
    var label  = document.getElementById('modalAccessLabel');
    var sub    = document.getElementById('modalAccessSub');
    badge.classList.remove('kl-access-limited');
    if (!accessDuration || accessDuration === 'null' || accessDuration === '') {
        // Accès à vie
        badge.className = 'flex-1 bg-brand-50 rounded-xl p-3 text-center border border-brand-100';
        icon.className  = 'material-symbols-outlined text-brand-500 text-xl block mb-1';
        icon.textContent = 'all_inclusive';
        label.className = 'text-xs text-brand-700 font-bold leading-tight';
        label.textContent = '{% trans "Accès à vie" %}';
        sub.textContent = '';
    } else {
        // Accès limité — animation pulse caramel
        badge.className = 'kl-access-limited flex-1 bg-amber-50 rounded-xl p-3 text-center border border-amber-200';
        icon.className  = 'material-symbols-outlined text-amber-500 text-xl block mb-1';
        icon.textContent = 'timer';
        label.className = 'text-xs text-amber-700 font-bold leading-tight';
        label.textContent = accessDuration;
        sub.textContent = "{% trans "d'accès" %}";
    }

    // Image
    var img = document.getElementById('modalImg');
    if (imgUrl) {
        img.src = imgUrl;
        img.alt = name;
        img.classList.remove('hidden');
    } else {
        img.classList.add('hidden');
    }

    // URLs
    document.getElementById('modalEnrollForm').action = enrollUrl;
    document.getElementById('modalDetailsLink').href  = detailsUrl;

    // Afficher avec animation
    var modal = document.getElementById('courseModal');
    var box   = document.getElementById('courseModalBox');
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(function() {
        box.style.transform = 'scale(1)';
        box.style.opacity   = '1';
    });
}

function closeCourseModal() {
    var box = document.getElementById('courseModalBox');
    box.style.transform = 'scale(0.95)';
    box.style.opacity   = '0';
    setTimeout(function() {
        document.getElementById('courseModal').classList.add('hidden');
        document.body.style.overflow = '';
    }, 280);
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeCourseModal();
});
</script>
